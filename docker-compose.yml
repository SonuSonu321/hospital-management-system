version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: hms-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: hospital_db

  backend:
    build: ./backend
    container_name: hms-backend
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/hospital_db
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: hms-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
